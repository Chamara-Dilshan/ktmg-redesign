        - generic [ref=e277]:
          - paragraph [ref=e278]: For over 30 years, Dr. Rena Keynigshteyn has dedicated her professional life to improving children’s health. A graduate of Tashkent Pediatric Medical Institute, Dr. Keynigshteyn completed a pediatric internship at Brookdale University Hospital and Medical Center in 2003. She finished a pediatric residency program at White Memorial Medical Center in 2005.
          - paragraph [ref=e279]: In the past 15 years, Dr. Keynigshteyn has been treating children and young adults in Culver City, CA. Having joined the Kids & Teens family, she now sees patients in Culver City and Tarzana, CA.
          - paragraph [ref=e280]: She is a fluent Russian speaker.
