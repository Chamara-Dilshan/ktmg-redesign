        - generic [ref=e152]:
          - paragraph [ref=e153]: At their office on Hughes Avenue in Culver City, California, the team of board-certified pediatricians at Kids & Teens Medical Group are experts in pediatrics, providing attentive and integrated patient-focused care.
          - paragraph [ref=e154]: The team specializes in general pediatrics, including newborn care, adolescent medicine, well-child exams, and specialized physicals for sports and school.
          - paragraph [ref=e155]: They also diagnose and treat common pediatric health conditions like asthma and allergies. For patient and parent convenience, Kids & Teens Medical Group is open seven days a week and offers after-hours care and telehealth appointments.
