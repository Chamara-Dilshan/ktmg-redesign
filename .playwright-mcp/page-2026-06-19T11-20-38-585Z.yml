        - heading "Downey" [level=1] [ref=e155]
        - paragraph [ref=e158]: Located on 4th Street in Downey, Kids & Teens Medical Group is a general pediatrics practice specializing in newborn care, well-child exams, and adolescent medicine. The team of board-certified pediatricians also diagnoses and treats common pediatric health conditions, including asthma, autism, and allergies. Taking an integrated and evidence-based approach to care, the team focuses on child health and well-being, providing vaccinations and nutrition services. Kids & Teens Medical Group offers health care services seven days a week, including after-hours care and extended evening appointments through their telehealth service.
