        - generic [ref=e554]:
          - paragraph [ref=e555]: Dr. Joe Gancayco, a dedicated healthcare professional, has navigated an impressive academic journey, earning his undergraduate degree in biology from UC Irvine, a master’s in nutrition from Columbia University, and a medical degree from California Northstate University. His commitment to pediatric excellence is underscored by the completion of his pediatrics training at Harbor-UCLA Medical Center in Torrance, CA.
          - paragraph [ref=e556]: A proud native of Los Angeles County, specifically from the South Bay, Dr. Joe is enthusiastic about contributing to the well-being of Southern California through his role at Kids & Teens Medical Group. His passion lies in providing exceptional pediatric care tailored to patients of all ages and diverse backgrounds.
          - paragraph [ref=e557]: In his leisure time, Dr. Joe finds joy in immersing himself in all things Marvel alongside his wife, indulging in the company of his dogs, avidly supporting LA sports teams, exploring new destinations through travel, and continuously expanding his knowledge base. Through both his professional and personal pursuits, Dr. Joe remains committed to fostering a healthier and happier community.
