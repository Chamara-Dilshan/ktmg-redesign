          - generic [ref=e249]:
            - heading "Palak Shelat" [level=3] [ref=e250]
            - paragraph [ref=e251]: M.D., FAAP
        - generic [ref=e253]: Dr. Palak Shelat is excited to join and be a part of the Kids and Teens Medical Group. She is a dedicated pediatrician who provides exceptional care to children and enjoys problem-solving with a positive, can-do attitude. She is fluent in English, Gujarati, and Hindi. Born and raised in India, Dr. Shelat came to the USA when she was a teenager. She always knew she wanted to become a physician. She pursued her dreams and earned as a New England Scholar, a Bachelor degree in Biological Sciences with a minor in Physiology & Neurobiology, and Molecular Cell Biology at the University of Connecticut. She completed her Doctor of Medicine degree at St. George’s University School of Medicine with high honors. She went on to complete her pediatric residency at NYU Langone Long Island Hospital. In her free time, she enjoys painting, tennis, meditation, yoga, long walks on the beach, and spending time with family and friends.
