            - heading "Adrienne C. Altman" [level=3] [ref=e223]
            - paragraph [ref=e224]: MD, Pediatrician
        - generic [ref=e226]: Adrienne C. Altman, MD grew up in Pennsylvania and New York. She spent her undergraduate years at Cornell University in Ithaca. NY and attended medical school in Syracuse at SUNY. Pediatric residency and Pediatric Hematology/Oncology fellowship and research at UCLA. After a few years, the joy of caring for well children beckoned and she joined Dr. Greenwald in Valenicia. A conductive climate and passion for horses have conspired to fill the rest of her time with dressage riding and hanging around in pastures.
