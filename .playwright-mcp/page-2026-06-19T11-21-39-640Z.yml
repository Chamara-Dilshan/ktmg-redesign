        - generic [ref=e308]:
          - paragraph [ref=e309]: Emily Brandt, MD is excited to join Kids & Teens Medical Group in Santa Clarita, Glendale and in Pasadena, CA. She is looking forward to fostering new relationships with patients and providing quality family centered care.
          - paragraph [ref=e310]: Dr. Brandt grew up outside of Buffalo, New York. She then went on to complete her undergraduate degree at Northeastern University in Boston where she majored in biology. She earned her Doctorate of Medicine at the University of New England College of Osteopathic Medicine in Maine and completed her pediatric residency training at LAC+USC Medical Center in Los Angeles.
          - paragraph [ref=e311]: Outside of the office, she enjoys spending time with family and friends, cooking, reading, camping, tennis and learning the ukulele.
