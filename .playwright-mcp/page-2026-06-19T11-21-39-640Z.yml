    - generic [ref=e215]:
      - generic [ref=e217]:
        - generic [ref=e220]:
          - figure [ref=e221]
          - generic [ref=e222]:
            - heading "Barbara Rodriguez" [level=3] [ref=e223]
            - paragraph [ref=e224]: MD, FAAP
        - generic [ref=e226]:
          - paragraph [ref=e227]: Barbara Rodriguez, MD, FAAP, joined Kids & Teens Medical Group in 1989, practicing out of the office locations in Arcadia, La Cañada Flintridge, Pasadena, and San Fernando, California. She has over 30 years of experience as a pediatrician. She now serves as co-medical director.
          - paragraph [ref=e228]
          - paragraph [ref=e229]: Dr. Rodriguez is a native Angeleno. She attended elementary and secondary parochial schools in the Los Angeles area prior to receiving her degree in Biological Sciences at the University of Southern California. Dr. Rodriguez earned her medical degree from Creighton University in Omaha, Nebraska. She returned to Los Angeles for her pediatric internship and residency at LAC+USC Medical Center, where she remained for a few years after training to serve as Clinical Instructor of Pediatrics. She left to pursue private practice, participate in Medical Missions in Mexico, and work in a federally qualified community health center.
          - paragraph [ref=e230]
          - paragraph [ref=e231]: Dr. Rodriguez has been board certified since 1989. She likes to focus on preventive medicine but is also very happy to support parents and guardians in the care of their children when they are acutely ill. She believes it instills confidence in their parenting skills. To better serve her patients, Dr. Rodriguez is bilingual in English and Spanish.
          - paragraph [ref=e232]
          - paragraph [ref=e233]: Outside the office, her interests include attending soccer matches, scuba diving, cooking, and spending time with her family. She also continues to be involved in teaching. She is a Volunteer Assistant Clinical Professor for the University of California Los Angeles (UCLA) School of Nursing, where she serves as a preceptor for students in their Pediatric Nurse Practitioner Program.
        - heading "Locations:" [level=2] [ref=e236]
        - link "Pasadena" [ref=e244] [cursor=pointer]:
