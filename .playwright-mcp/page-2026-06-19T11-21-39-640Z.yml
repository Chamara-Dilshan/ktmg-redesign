        - heading "Pasadena" [level=1] [ref=e150]
        - paragraph [ref=e153]: Kids & Teens Medical Group is a general pediatrics practice that provides attentive and comprehensive care for infants, children, and teens at their Pasadena, California, office located on Sierra Madre Boulevard. The team of board-certified pediatricians takes an integrated approach to care, listening intently to parents and patients whether coming in for a well-child exam, sick visit, or after-hours care. The pediatricians specialize in diagnosing and treating common pediatric health conditions like asthma, autism, and allergies. Kids & Teens Medical Group offers appointments seven days a week, including extended evening hours through their telehealth service.
