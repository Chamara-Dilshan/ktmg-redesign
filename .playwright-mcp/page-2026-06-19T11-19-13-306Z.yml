        - heading "La Cañada Flintridge" [level=1] [ref=e150]
        - generic [ref=e152]: Kids & Teens Medical Group provides comprehensive primary pediatric care for infants, children, and teens. At their La Cañada Flintridge office on Foothill Boulevard, the team of board-certified pediatricians specializes in newborn care, adolescent medicine, and pediatric infectious disease. The general pediatrics practice also provides well-child exams, vaccinations, sports and school physicals, and nutrition services as well as sick visits and urgent care. Kids & Teens Medical Group is open seven days a week and has extended after-hours care through their telehealth service.
