            - heading "Janesri De Silva" [level=3] [ref=e222]
            - paragraph [ref=e223]: MD, FAAP
        - generic [ref=e225]:
          - paragraph [ref=e226]: Janesri De Silva, MD, FAAP, is the Medical Director of Serendib Healthways and Kids & Teens Medical Group. She currently practices general pediatrics and adolescent medicine at the Kids & Teens Medical Group location in La Cañada Flintridge.
          - paragraph [ref=e227]: Dr. De Silva graduated from UCLA with a bachelor’s degree in neuroscience and then went on to the American University of the Caribbean to complete her medical degree.
          - paragraph [ref=e228]: She completed part of her medical training at USC, Yale-affiliated hospitals, and other hospitals in Maryland and Chicago. She then completed a three-year pediatric residency at Kaiser Permanente, Sunset. While at Kaiser, she wrote a manual for pediatric interns on how to take care of patients.
          - paragraph [ref=e229]: After her residency, she did a fellowship at Children’s Hospital Los Angeles (CHLA) in Adolescent Medicine and worked at the Los Angeles Free Clinic. At CHLA, Dr. De Silva worked on research involving transitioning chronically ill children to adult health care.
          - paragraph [ref=e230]: She was the 2014 to 2016 chair of the pediatric department at Northridge Hospital Medical Center in Northridge and is on staff at Valley Presbyterian Hospital in Van Nuys, Tarzana Medical Center, and Huntington Memorial Hospital in Pasadena, California.
          - paragraph [ref=e231]: Dr. De Silva is a mother of two children. Outside of practicing medicine, she enjoys yoga, dance, and playing piano.
