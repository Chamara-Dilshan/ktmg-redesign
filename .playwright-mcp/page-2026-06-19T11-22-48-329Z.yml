            - heading "Jose Vargas" [level=3] [ref=e221]
            - paragraph [ref=e222]: PA Certified Physician Assistant
        - generic [ref=e224]: Physician assistant Jose Vargas, PA, brings a wealth of experience in pediatric and family medicine to the team at Kids & Teens Medical Group. He has been in practice in the San Fernando Valley for 35 years and is excited to continue serving the diverse community at the practice’s San Fernando, California, location. Jose completed the physician assistant program in family practice and pediatrics at Charles R. Drew University of Medicine and Science in Los Angeles, California. At Kids & Teens Medical Group, Jose specializes in general pediatrics and child development. He enjoys learning and meeting new challenges, and his priority is to provide high-quality pediatric care to young children and teens in the community. In his free time, Jose pursues many outdoor activities such as camping, hiking, and cycling. He enjoys keeping fit and attends the gym regularly. Jose promotes a healthy lifestyle and encourages his patients and their families to get out and exercise.
