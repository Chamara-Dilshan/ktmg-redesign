      - generic [ref=e152]:
        - paragraph [ref=e153]: Kids & Teens Medical Group is a general pediatrics practice that provides primary care services for infants, children, and teens. At the Van Nuys, California, office on Gilmore Street, the team of board-certified pediatricians manages all aspects of a child’s health needs, from well-child exams to sick visits to vaccinations.
        - paragraph [ref=e154]: The team also specializes in diagnosing and treating common pediatric health problems like asthma and allergies, as well as neurodevelopmental conditions such as autism. Kids & Teens Medical Group provides care seven days a week, including after-hours care with extended hours through their telehealth service.
