          - generic [ref=e334]:
            - heading "Martin Fineberg" [level=3] [ref=e335]
            - paragraph [ref=e336]: MD, FAAP Board Certified Pediatrician
        - generic [ref=e338]:
          - paragraph [ref=e339]: Martin Fineberg, MD, FAAP, is a caring pediatrician who has been working in the San Fernando Valley since 1988. He is a member of the compassionate team at Kids & Teens Medical Group and sees patients in Agoura Hills, Beverly Hills, Encino, and Pasadena, California.
          - paragraph [ref=e340]: A native of Melbourne, Australia, he studied medicine at The University of Melbourne. He then trained in pediatrics at the Royal Children’s Hospital in Melbourne, followed by a pediatric residency at Emory University in Atlanta. Following residency, he undertook additional training in neonatology at Children’s Hospital Los Angeles. In addition, Dr. Fineberg worked in the area of pediatric hematology/oncology at the Prince of Wales Hospital in Sydney, Australia.
          - paragraph [ref=e341]: Dr. Fineberg is licensed to practice medicine in California and Australia and was board certified by the American Board of Pediatrics in 1985. He was re-certified in 2009 and is current with Maintenance of Certification with the American Board of Pediatrics. He is a fellow of the American Academy of Pediatrics, a member of the California Medical Association and the American Medical Association, and an American Academy member of the Canadian Paediatric Society.
          - paragraph [ref=e342]: Dr. Fineberg has a special interest in the care of high-risk NICU graduates and children with pulmonary diseases. He is now available for well- and sick-child appointments in the Pasadena and Northridge offices of Kids & Teens Medical Group.
