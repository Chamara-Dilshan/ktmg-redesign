        - generic [ref=e152]:
          - paragraph [ref=e153]: Kids & Teens Medical Group offers the highest quality of general pediatric care at their Torrance office.
          - paragraph [ref=e154]: The team of board-certified pediatricians takes an integrated and evidence-based approach, providing comprehensive newborn care, well-child exams, and physicals.
          - paragraph [ref=e155]: They also specialize in adolescent medicine, pediatric infectious disease, asthma, and allergies. To make health care more accessible to those living and working in the Greater Los Angeles area, Kids & Teens Medical Group provides care seven days a week and offers after-hours care with extended hours through their telehealth service.
