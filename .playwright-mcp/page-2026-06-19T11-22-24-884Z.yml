            - paragraph [ref=e225]: M.D, FAAP
        - generic [ref=e227]: Rachel Barbour, MD, completed her undergraduate studies in Biology and Global Poverty at the University of California, Berkeley. She earned her Doctor of Medicine at Chicago Medical School and completed her residency in Pediatrics at the University of Arizona. During her residency, she completed a certification in Integrative Medicine and participated as a fellow in the Arizona LEND program (Leadership Education in Neurodevelopmental and Related Disabilities). Originally from Southern California, Dr. Barbour is thrilled to be returning to California and to be joining Kids & Teens Medical Group. She is passionate about providing excellent care to her patients and looks forward to building relationships with families in the community. Outside of the office, she enjoys spending time with her family, cooking, playing tennis, and traveling.
