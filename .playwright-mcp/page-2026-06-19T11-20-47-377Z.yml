        - paragraph [ref=e294]: Mealynne is a Certified Pediatric Nurse Practitioner that received a Master of Nursing at the University of South Florida. She has over 6 years of overall pediatric experience in both outpatient environments and inpatient level one trauma centers. She is passionate about educating patients and families regarding health prevention and promotion. In her free time, she enjoys traveling, finding new food places to try, outdoor activities and spending time with her American Eskimo dog.
