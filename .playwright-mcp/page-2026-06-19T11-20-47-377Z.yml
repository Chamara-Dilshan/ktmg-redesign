            - heading "Sharmetha Ramanan" [level=3] [ref=e257]
            - paragraph [ref=e258]: PNP
        - generic [ref=e260]: Sharmetha Ramanan, PNP is a certified pediatric nurse practitioner at Kids & Teens medical group. Sharmetha obtained her masters in pediatric nursing at Massachusetts General Hospital’s Institute of Health Professions in Boston. She is new to LA and is excited to make an impact in this community. Her career in pediatrics began through volunteering at children’s hospitals in Sri Lanka while visiting family there. In college, she studied abroad in Australia as a medical assistant for a children’s heart and lung center and was an EMT for many children’s summer camps during her time as a student at Boston University. Additionally, she helped conduct research on infant neuro-cognitive development as a research assistant at Boston Children’s Hospital. Sharmetha has always had a passion for kids and strives to be a support system and positive influence for her patients as they navigate the various stages between childhood and adulthood.
