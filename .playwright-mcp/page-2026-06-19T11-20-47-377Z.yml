            - heading "Emily Brandt" [level=3] [ref=e225]
            - paragraph [ref=e226]: MD
        - generic [ref=e228]: Emily Brandt, DO is excited to join Kids & Teens Medical Group in Santa Clarita, Glendale and in Pasadena, CA. She is looking forward to fostering new relationships with patients and providing quality family centered care. Dr. Brandt grew up outside of Buffalo, New York. She then went on to complete her undergraduate degree at Northeastern University in Boston where she majored in biology. She earned her Doctorate of Medicine at the University of New England College of Osteopathic Medicine in Maine and completed her pediatric residency training at LAC+USC Medical Center in Los Angeles. Outside of the office, she enjoys spending time with family and friends, cooking, reading, camping, tennis and learning the ukulele.
