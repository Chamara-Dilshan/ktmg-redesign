          - generic [ref=e265]:
            - heading "Victoria Millet" [level=3] [ref=e266]
            - paragraph [ref=e267]: MD, FAAP Board Certified Infectious Disease
        - generic [ref=e269]: Victoria Millet, MD, FAAP, is an experienced, board-certified pediatrician practicing at the Kids & Teens Medical Group locations in Encino, Northridge, Van Nuys, California. She has been in private pediatric practice since 1984 and joined Kids & Teens Medical Group in January of 2011. Dr. Millet completed her undergraduate studies at the University of California at Los Angeles, where she majored in zoology in 1969. She earned a Master of Science degree from the University of Southern California in 1972 and then completed a three-year residency in pediatrics at University Hospital in San Diego in 1975. She completed a pediatric infectious diseases/ambulatory pediatrics fellowship at the Center for the Health Sciences at the University of California at Los Angeles in 1980. Dr. Millet continues to do consulting work in pediatric infectious diseases for Kids & Teens Medical Group and her colleagues in the local pediatric community. She enjoys teaching and is a member of the Family Practice Residency Program faculty at Northridge Hospital Medical Center. She is also a clinical faculty member at the UCLA School of Nursing.
