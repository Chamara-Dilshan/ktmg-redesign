            - heading "Brian Bhatt" [level=3] [ref=e298]
            - paragraph [ref=e299]: MD, FAAP
        - generic [ref=e301]: Dr. Brian Bhatt, born and brought up in the Northeast, is looking forward to being a part of the family at the Kids and Teens Medical Group. Dr. Bhatt obtained his Bachelor’s degree in Biological Sciences at the University of Connecticut, and Doctor of Medicine degree from St. George’s University School of Medicine. He went to NYU Langone Long Island Hospital to complete a three-year pediatric residency in a robust environment. He is a driven physician, keen to establish a strong rapport and provide the best medical care possible for all age groups. He is fluent in English and Gujarati. Outside of medicine, Dr. Bhatt is a husband and a father. He enjoys his time cooking, playing tennis, relaxing at the beach, learning about and collecting vintage watches, and enjoying a good marvel movie night with family & friends.
