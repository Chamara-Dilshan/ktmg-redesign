          - generic [ref=e221]:
            - heading "Hilma Benjamin" [level=3] [ref=e222]
            - paragraph [ref=e223]: MD, FAAP Board Certified Pediatrician
        - generic [ref=e225]: Hilma Benjamin, MD, FAAP, is a member of the caring team at Kids & Teens Medical Group. She serves patients from the practice’s location in Northridge, California. Dr. Benjamin graduated from the University of the Virgin Islands with a Bachelor of Science in biology in 1996 before earning a Master of Science in molecular and cellular biology at the University of Maryland, Baltimore County, in 1998. She received her medical degree in 2004 from Penn State College of Medicine and completed her residency in general pediatrics in 2007 at All Children’s Hospital in St. Petersburg, Florida, and Tampa General Hospital in Tampa, Florida. Before joining Kids & Teens Medical Group in 2009, she completed several locum tenens assignments in private practice in the San Francisco Bay Area and at the Natividad Medical Center in Salinas, affiliated with the University of California, San Francisco (UCSF). Dr. Benjamin currently serves as the acting Medical Director of Kids and Teens’ Extended Hours/After Hours Care services. Her special interests include child behavior, growth and development, dental care, nutrition, and physical education.
