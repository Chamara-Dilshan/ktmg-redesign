      - generic [ref=e152]:
        - paragraph [ref=e153]: Kids & Teens Medical Group provides high-quality primary care for their pediatric patients at their Northridge, California, office on Reseda Boulevard. The team of board-certified pediatricians provides comprehensive care to meet any child’s health needs, including well-child exams, newborn care, sick visits, and urgent care.
        - paragraph [ref=e154]: They also specialize in diagnosing and treating health conditions like autism, asthma, and allergies and have a pediatric infectious disease expert on staff.
        - paragraph [ref=e155]: For parent flexibility, Kids & Teens Medical Group has after-hours care with extended evening hours through their telehealth service.
