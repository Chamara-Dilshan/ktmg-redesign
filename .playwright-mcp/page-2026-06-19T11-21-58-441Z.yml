        - heading "San Fernando" [level=1] [ref=e150]
        - generic [ref=e152]: Kids & Teens Medical Group offers expert pediatrics care at their San Fernando, California, office on Truman Street. The team of board-certified pediatricians at the general pediatrics practice takes an integrated approach to care, listening closely to their patients’ needs and concerns whether during a well-child exam or urgent care visit. From newborn care to adolescent medicine, the team focuses on promoting health and well-being, offering vaccinations and nutrition services. The team also specializes in diagnosing and treating allergies, asthma, and attention-deficit disorder/attention-deficit hyperactivity disorder (ADHD).
