          - generic [ref=e286]:
            - heading "Laurie Beth Juarez- Morales" [level=3] [ref=e287]
            - paragraph [ref=e288]: MD
        - paragraph [ref=e291]: Dr. Juarez is a seasoned pediatrician with over a decade of experience serving the vibrant community of the San Fernando Valley, where she was born and raised. From a tender age, her heart was set on pediatric medicine, and today, she feels privileged to live out her childhood dream. With a commitment to practicing medicine with compassion and thoroughness, Dr. Juarez believes deeply in the significance of the journey alongside the connections forged with patients and families. Beyond her professional endeavors, she finds immense joy in her role as a mother to a wonderful son and cherishes the time spent with her family. Dr. Juarez holds a degree in Molecular Biology with a minor in Education from UCLA, and prior to her medical training, she conducted novel research in neurology at UCLA’s Multiple Sclerosis Laboratory, contributing to multiple publications on hormonal treatments for the condition. She completed her medical education at Loma Linda School of Medicine and pediatric residency at UCI, and she continues to foster the next generation of healthcare providers as a volunteer assistant clinical professor at UCLA School of Nursing. Dr. Juarez is fluent in both Spanish and Tagalog and is deeply passionate about child development, literature, arts, travel, and music. As the former/incumbent Department Chair of Pediatrics at Pacifica Hospital of the Valley, her focus extends beyond individual care to encompass education, comprehensive wellness, and community outreach, embodying her belief in the embracive approach to health and wellbeing.
