          - generic [ref=e306]:
            - heading "Rohina Furmuly" [level=3] [ref=e307]
            - paragraph [ref=e308]: PA-C
        - paragraph [ref=e311]: Rohina Furmuly is a nationally board-certified physician assistant. She practices from the Kids & Teens Medical Group office locations in Northridge, West Hills, Van Nuys, and Pasadena. After completing her Bachelor of Science degree in physiological science at UCLA, Rohina earned her Master of Science degree in physician assistant studies at Western University of Health Sciences. She specializes in pediatrics and has substantial experience in internal medicine. Prior to joining Kids & Teens Medical Group, Rohina served the veterans of Ventura County at the Community Based Outpatient Clinic of the Department of Veteran Affairs. She also worked for Pediatric Affiliates and Tarzana Pediatric Medical Groups. Rohina is a member of the American Academy of Physician Assistants and is certified by the National Commission of Certification of Physician Assistants. In addition to her clinical work, Rohina has performed epidemiological and clinical research for the UCLA Nuclear Medicine Department, the Kaiser Permanente Research and Evaluation Department, and Amgen, Inc. Her areas of focus have included Alzheimer’s disease and dementia; and she has co-authored two publications. Rohina is an avid traveler and adventurer. When she’s not caring for patients at Kids & Teens Medical Group, she enjoys reading, outdoor activities, spending time with family and friends. Rohina is also actively involved with several charitable organizations.
