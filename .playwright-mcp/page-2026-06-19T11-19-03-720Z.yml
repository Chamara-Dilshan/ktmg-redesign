        - generic [ref=e153]:
          - paragraph [ref=e154]: Located on Clareton Drive in Agoura Hills, California, Kids & Teens Medical Group is a general pediatrics practice specializing in newborn care, well-child exams, and adolescent medicine.
          - paragraph [ref=e155]: The team of board-certified pediatricians also diagnoses and treats common pediatric health conditions, including asthma, autism, and allergies.
          - paragraph [ref=e156]: Taking an integrated and evidence-based approach to care, the team focuses on child health and well-being, providing vaccinations and nutrition services.
          - paragraph [ref=e157]: Kids & Teens Medical Group offers health care services seven days a week, including after-hours care and extended evening appointments through their telehealth service.
