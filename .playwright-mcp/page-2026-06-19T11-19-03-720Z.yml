          - paragraph [ref=e228]: MD, FAAP Board Certified Pediatrician
      - generic [ref=e230]:
        - paragraph [ref=e231]: Pediatrician Mark G. Snyder, MD, FAAP, is excited to be a member of Kids & Teens Medical Group. He joined the medical group in 2017 and sees patients at the practice’s locations in Agoura Hills and West Hills, California. His interests are in general pediatrics.
        - paragraph [ref=e232]: Dr. Snyder grew up locally in Woodland Hills, California, and graduated from El Camino Real High School. He received his Bachelor of Science in Bioengineering at the University of California San Diego and then earned his medical degree from the University of Kansas Medical School.
        - paragraph [ref=e233]: He completed his pediatrics residency at Cedars-Sinai Medical Center, located in Los Angeles, and worked at Pediatric Affiliates Medical Group. He has always been a fellow of the American Academy of Pediatrics and has maintained his board certification with the American Board of Pediatrics.
        - paragraph [ref=e234]: Dr. Snyder’s hobbies outside of work include spending time with family, mountain biking, kayaking, long walks with the family pooch, astronomy/observing the night sky, and keeping up with current events and politics.
